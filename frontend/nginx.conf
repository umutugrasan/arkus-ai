server {
    listen 8080;
    server_name arkus.tr www.arkus.tr localhost 127.0.0.1;
    
    # Yereldeysen (localhost) yonlendirme yapma, canlida (arkus.tr degilse) yonlendir
    set $do_redirect 1;
    if ($host ~* ^(arkus\.tr|www\.arkus\.tr|localhost|127\.0\.0\.1|frontend)$ ) {
        set $do_redirect 0;
    }
    if ($do_redirect = 1) {
        return 301 https://arkus.tr$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # API yönlendirmesi (Cloud Run üzerinde backend URL'si doğrudan React içinden verilecek)

    # Sağlık kontrolü
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API proxy — backend'e yönlendir (streaming SSE dahil)
    # Değişken kullanılıyor: nginx startup'ta backend DNS'i çözmesin
    # (Cloud Run'da backend container yok — doğrudan VITE_API_URL kullanılır)
    location /api/ {
        resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;
        set $backend_upstream "http://backend:8080";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming için kritik ayarlar
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # SPA: Tüm 404'leri index.html'e yönlendir (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik varlıklar için uzun cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gizli dosyalara erişimi engelle
    location ~ /\. {
        deny all;
    }
}
