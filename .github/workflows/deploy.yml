name: Deploy Fullstack to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west3
  REPO_NAME: uygulama-havuzu
  BACKEND_REGION: europe-west3
  FRONTEND_REGION: europe-west1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker ${{ env.BACKEND_REGION }}-docker.pkg.dev

    - name: Build and Push Backend
      run: |
        docker build -t ${{ env.BACKEND_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend-service:latest ./backend
        docker push ${{ env.BACKEND_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend-service:latest

    - name: Deploy Backend to Cloud Run
      run: |
        gcloud run deploy backend-service \
          --image ${{ env.BACKEND_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend-service:latest \
          --region ${{ env.BACKEND_REGION }} \
          --allow-unauthenticated \
          --port 8080 \
          --add-cloudsql-instances=gen-lang-client-0173678969:europe-west3:arkus-db \
          --set-env-vars DATABASE_URL="postgresql://postgres:d30R_MJG%26tXqeq_4%24I{p%27pwgRA@localhost/postgres?host=/cloudsql/gen-lang-client-0173678969:europe-west3:arkus-db"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker ${{ env.FRONTEND_REGION }}-docker.pkg.dev

    - name: Build and Push Frontend
      run: |
        docker build -t ${{ env.FRONTEND_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend-service:latest ./frontend
        docker push ${{ env.FRONTEND_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend-service:latest

    - name: Deploy Frontend to Cloud Run
      run: |
        gcloud run deploy frontend-service \
          --image ${{ env.FRONTEND_REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend-service:latest \
          --region ${{ env.FRONTEND_REGION }} \
          --allow-unauthenticated \
          --port 8080
