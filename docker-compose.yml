services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: basiret-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: basiret
      POSTGRES_PASSWORD: basiretpassword
      POSTGRES_DB: basiret_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basiret -d basiret_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - basiret-net

  # ─── Sahte Pazaryeri API (Trendyol/HB/Amazon TR simulasyonu) ─────────────────
  mock-api:
    build:
      context: ./backend
      dockerfile: mock_api/Dockerfile
    container_name: basiret-mock-api
    restart: unless-stopped
    ports:
      - "8001:8001"       # http://localhost:8001 ile dogrudan erisim
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - basiret-net

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: basiret-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://basiret:basiretpassword@db:5432/basiret_db
      - MOCK_MARKETPLACE_API_URL=http://mock-api:8001
    ports:
      - "8000:8000"       # Opsiyonel: Swagger UI için doğrudan erişim
    depends_on:
      db:
        condition: service_healthy
      mock-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - basiret-net

  # ─── React Frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: basiret-frontend
    restart: unless-stopped
    ports:
      - "3000:80"         # http://localhost:3000 ile erişilir
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - basiret-net

  # ─── Adminer (Veritabanı Görüntüleyici Arayüz) ────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: basiret-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"       # http://localhost:8080 ile erişilir
    depends_on:
      - db
    networks:
      - basiret-net

networks:
  basiret-net:
    driver: bridge

volumes:
  pgdata:
